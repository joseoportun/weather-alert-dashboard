<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weather Alerts Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin:0; font-family: Arial, sans-serif; display:flex; background: linear-gradient(135deg,#0a1a12,#06110c); color:#e6fff1; }
    #sidebar { width: 360px; height: 100vh; overflow-y: auto; padding: 15px; backdrop-filter: blur(12px); background: rgba(15,40,25,0.6); border-right:1px solid rgba(100,255,180,0.15); }
    #map { flex:1; height:100vh; }
    .alert { margin-bottom:12px; padding:12px; border-radius:10px; backdrop-filter: blur(10px); background: rgba(20,60,40,0.45); border:1px solid rgba(120,255,180,0.15); }
    .mini-map { height:130px; margin-top:8px; border-radius:8px; overflow:hidden; }
    select, button, input { width:100%; margin-bottom:10px; padding:8px; border-radius:8px; border:1px solid rgba(120,255,180,0.2); background: rgba(0,0,0,0.3); color:#e6fff1; }
    .dropdown { display:none; font-size:13px; }
    .toggle { cursor:pointer; color:#7bffc3; }
  </style>
</head>
<body>

<div id="sidebar">
  <h2>Alerts Dashboard</h2>

  <label>Refresh (seconds)</label>
  <input type="number" id="refreshRate" value="300">
  <button onclick="applyRefresh()">Apply Refresh</button>

  <button onclick="enableNotifications()">Enable Notifications</button>

  <select id="stateFilter">
    <option value="">All States</option>
  </select>

  <div id="alerts"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([39.5, -98.35], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allAlerts = [];
let markers = [];
let refreshTimer = null;
let seenAlerts = JSON.parse(localStorage.getItem('seenAlerts') || '{}');
let notified = {};

const tornadoSound = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
const floodSound = new Audio('https://actions.google.com/sounds/v1/water/water_splash.ogg');

function getColor(event) {
  if (event === 'Tornado Warning') return 'red';
  if (event === 'Flash Flood Warning') return 'blue';
  return 'gray';
}

function getLink(event) {
  if (event === 'Tornado Warning') return 'https://forecast.weather.gov/wwamap/wwatxtget.php?cwa=usa&wwa=Tornado%20Warning';
  if (event === 'Flash Flood Warning') return 'https://forecast.weather.gov/wwamap/wwatxtget.php?cwa=usa&wwa=Flash%20Flood%20Warning';
  return '#';
}

function enableNotifications() {
  Notification.requestPermission();
}

function sendNotification(alert) {
  if (Notification.permission === 'granted' && !notified[alert.id]) {
    new Notification(alert.properties.event, {
      body: alert.properties.headline || alert.properties.areaDesc
    });

    if (alert.properties.event === 'Tornado Warning') tornadoSound.play();
    if (alert.properties.event === 'Flash Flood Warning') floodSound.play();

    notified[alert.id] = true;
  }
}

async function fetchAlerts() {
  const res = await fetch('https://api.weather.gov/alerts/active');
  const data = await res.json();

  allAlerts = data.features.filter(a =>
    a.properties.event === 'Tornado Warning' ||
    a.properties.event === 'Flash Flood Warning'
  );

  allAlerts.forEach(sendNotification);

  populateStates();
  renderAlerts();
}

function populateStates() {
  const select = document.getElementById('stateFilter');
  select.innerHTML = '<option value="">All States</option>';

  const states = [...new Set(allAlerts.map(a => a.properties.geocode?.UGC?.[0]?.slice(0,2)).filter(Boolean))];

  states.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function zoomTo(coords) {
  const bounds = L.polygon(coords).getBounds();
  map.fitBounds(bounds);
}

function toggleSeen(id, checkbox) {
  seenAlerts[id] = checkbox.checked;
  localStorage.setItem('seenAlerts', JSON.stringify(seenAlerts));
}

function renderAlerts() {
  const container = document.getElementById('alerts');
  container.innerHTML = '';
  clearMarkers();

  const state = document.getElementById('stateFilter').value;

  const filtered = allAlerts.filter(a => {
    const code = a.properties.geocode?.UGC?.[0]?.slice(0,2);
    return !state || code === state;
  });

  filtered.forEach((alert, i) => {
    const div = document.createElement('div');
    div.className = 'alert';

    const props = alert.properties;
    const link = getLink(props.event);

    div.innerHTML = `
      <h4>${props.event}</h4>
      <p>${props.headline || ''}</p>
      <p><b>Area:</b> ${props.areaDesc}</p>
      <p><b>Start:</b> ${new Date(props.effective).toLocaleString()}</p>
      <p><b>End:</b> ${new Date(props.expires).toLocaleString()}</p>
      <a href="${link}" target="_blank">Open Alert</a>

      <label><input type="checkbox" ${seenAlerts[alert.id] ? 'checked' : ''} onchange="toggleSeen('${alert.id}', this)"> Seen</label>

      <button onclick="zoomTo(window.coords${i})">Zoom to Alert</button>

      <div class="toggle" onclick="toggleDesc(${i})">Show Details</div>
      <div id="desc-${i}" class="dropdown">${props.description}</div>

      <div id="mini-${i}" class="mini-map"></div>
    `;

    container.appendChild(div);

    if (alert.geometry) {
      const coords = alert.geometry.coordinates[0].map(c => [c[1], c[0]]);
      window[`coords${i}`] = coords;

      const polygon = L.polygon(coords, { color: getColor(props.event), weight:3 }).addTo(map);
      markers.push(polygon);

      const miniMap = L.map(`mini-${i}`, { zoomControl:false, attributionControl:false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(miniMap);
      const miniPoly = L.polygon(coords, { color: getColor(props.event) }).addTo(miniMap);
      miniMap.fitBounds(miniPoly.getBounds());
    }
  });
}

function toggleDesc(i) {
  const el = document.getElementById(`desc-${i}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function applyRefresh() {
  const seconds = parseInt(document.getElementById('refreshRate').value);
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(fetchAlerts, seconds * 1000);
}


document.getElementById('stateFilter').addEventListener('change', renderAlerts);

applyRefresh();
fetchAlerts();
</script>

</body>
</html>
