<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Alerts Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1f14;
  color: #d4f5e9;
}

#container {
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 320px;
  overflow-y: auto;
  background: #0f2a1c;
  padding: 10px;
  border-right: 2px solid #1f4d36;
}

.alert {
  border: 1px solid #1f4d36;
  border-radius: 8px;
  margin-bottom: 10px;
  padding: 10px;
}

.alert.red { border-left: 6px solid red; }
.alert.blue { border-left: 6px solid blue; }

.alert h4 {
  margin: 0 0 5px 0;
}

button, select {
  margin-top: 5px;
  background: #1f4d36;
  color: white;
  border: none;
  padding: 5px;
  border-radius: 4px;
}

#map {
  flex: 1;
}

.mini-map {
  height: 150px;
  margin-top: 5px;
}
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h3>Alerts</h3>
    <select id="stateFilter">
      <option value="ALL">All States</option>
    </select>
    <div id="alerts"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([37.8, -96], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allAlerts = [];

async function fetchAlerts() {
  const res = await fetch('https://api.weather.gov/alerts/active');
  const data = await res.json();

  allAlerts = data.features.filter(a => {
    const e = a.properties.event;
    return e === 'Tornado Warning' || e === 'Flash Flood Warning';
  });

  populateStates();
  renderAlerts();
}

function populateStates() {
  const select = document.getElementById('stateFilter');
  const states = new Set();

  allAlerts.forEach(a => states.add(a.properties.areaDesc.split(', ')[0]));

  states.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });
}

function renderAlerts() {
  const container = document.getElementById('alerts');
  container.innerHTML = '';

  const filter = document.getElementById('stateFilter').value;

  allAlerts.forEach((alert, i) => {
    const props = alert.properties;
    const state = props.areaDesc.split(', ')[0];

    if (filter !== 'ALL' && state !== filter) return;

    const div = document.createElement('div');
    div.className = 'alert ' + (props.event.includes('Tornado') ? 'red' : 'blue');

    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = props.event;

    const content = document.createElement('div');
    content.innerHTML = `
      <p><b>State:</b> ${state}</p>
      <p><b>Counties:</b> ${props.areaDesc}</p>
      <p><b>Start:</b> ${props.effective}</p>
      <p><b>End:</b> ${props.expires}</p>
      <a href="${props.uri}" target="_blank">Open Alert</a>
      <br>
      <label><input type="checkbox"> Seen</label>
      <br>
      <button onclick="zoomTo(${i})">Zoom</button>
      <div id="mini-${i}" class="mini-map"></div>
    `;

    details.appendChild(summary);
    details.appendChild(content);
    div.appendChild(details);
    container.appendChild(div);

    drawMiniMap(alert, i);
    drawMain(alert);
  });
}

function drawMain(alert) {
  if (!alert.geometry) return;
  const geo = L.geoJSON(alert.geometry, {
    style: {
      color: alert.properties.event.includes('Tornado') ? 'red' : 'blue'
    }
  }).addTo(map);
}

function drawMiniMap(alert, i) {
  if (!alert.geometry) return;

  const mini = L.map(`mini-${i}`, {
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mini);

  const geo = L.geoJSON(alert.geometry).addTo(mini);
  mini.fitBounds(geo.getBounds());
}

function zoomTo(i) {
  const alert = allAlerts[i];
  if (!alert.geometry) return;
  const geo = L.geoJSON(alert.geometry);
  map.fitBounds(geo.getBounds());
}

document.getElementById('stateFilter').addEventListener('change', renderAlerts);

fetchAlerts();
</script>
</body>
</html>
