<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Alert Monitor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
body { margin:0; font-family: Arial; }
#map { position:absolute; top:0; bottom:0; left:0; right:300px; }
#dashboard {
  position:absolute;
  top:0;
  right:0;
  width:300px;
  height:100%;
  background:#111;
  color:#fff;
  overflow-y:auto;
  padding:10px;
}
.alert { border:1px solid #444; padding:8px; margin-bottom:8px; }
.seen { background:#333 !important; }
button, select { width:100%; margin-top:5px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="dashboard">
  <h3>Active Alerts</h3>
  <button onclick="refreshAlerts()">Refresh Alerts</button>
  <label><input type="checkbox" id="radarToggle"> Radar Overlay</label>
  <label><input type="checkbox" id="notifyToggle"> Desktop Notifications</label>
  <select id="soundSelect">
    <option value="beep">Beep</option>
    <option value="alert">Alert</option>
  </select>
  <div id="alerts"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let map = L.map('map').setView([39,-95],4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let radarLayer = L.tileLayer('https://tilecache.rainviewer.com/v2/radar/nowcast/256/{z}/{x}/{y}/2/1_1.png');

document.getElementById('radarToggle').onchange = function() {
  if(this.checked) map.addLayer(radarLayer);
  else map.removeLayer(radarLayer);
};

let alertsLayer = L.layerGroup().addTo(map);
let lastAlertCount = 0;

async function fetchAlerts() {
  let res = await fetch('https://api.weather.gov/alerts/active');
  let data = await res.json();
  return data.features;
}

function playSound() {
  let type = document.getElementById('soundSelect').value;
  let audio = new Audio(type === 'beep' ? 'https://actions.google.com/sounds/v1/alarms/beep_short.ogg' : 'https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg');
  audio.play();
}

function notify(text) {
  if(Notification.permission === 'granted') {
    new Notification(text);
  }
}

async function refreshAlerts() {
  let alerts = await fetchAlerts();
  alertsLayer.clearLayers();
  document.getElementById('alerts').innerHTML = '';

  if(alerts.length > lastAlertCount) {
    if(document.getElementById('notifyToggle').checked) {
      playSound();
      notify('New Weather Alert!');
    }
  }
  lastAlertCount = alerts.length;

  alerts.forEach(alert => {
    let coords = alert.geometry ? alert.geometry.coordinates[0] : null;
    if(coords) {
      let latlngs = coords.map(c => [c[1], c[0]]);
      let polygon = L.polygon(latlngs, {color:'red'}).addTo(alertsLayer);
      polygon.on('click', () => map.fitBounds(polygon.getBounds()));
    }

    let div = document.createElement('div');
    div.className = 'alert';

    let checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.onchange = () => {
      div.classList.toggle('seen');
    };

    let select = document.createElement('select');
    let opt = document.createElement('option');
    opt.text = alert.properties.headline;
    select.add(opt);

    select.onchange = () => {
      window.open(alert.properties.uri, '_blank');
    };

    div.innerHTML += `<strong>${alert.properties.event}</strong><br>${alert.properties.areaDesc}`;
    div.appendChild(checkbox);
    div.appendChild(select);

    document.getElementById('alerts').appendChild(div);
  });
}

if("Notification" in window) {
  Notification.requestPermission();
}

refreshAlerts();
setInterval(refreshAlerts, 60000);
</script>
</body>
</html>
