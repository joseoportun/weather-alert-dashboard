<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Weather Alert Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial; }
    #map { height: 90vh; }
    #controls { padding:10px; background:#111; color:#fff; }
    .legend span { display:inline-block; width:12px; height:12px; margin-right:5px; }
  </style>
</head>
<body>

<div id="controls">
  <strong>Filters:</strong>
  <select id="filter">
    <option value="all">All</option>
    <option value="Tornado">Tornado</option>
    <option value="Flood">Flood</option>
  </select>

  <input type="text" id="stateSearch" placeholder="Search state (e.g. TX)" />

  <span id="timestamp"></span>

  <div class="legend">
    <span style="background:red;"></span> Tornado
    <span style="background:orange;"></span> Flood
    <span style="background:blue;"></span> Other
  </div>
</div>

<div id="map"></div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
