<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Alerts Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #07140d, #0b2a1c);
  color: #e6fff5;
}

#container {
  display: flex;
  height: 100vh;
}

#sidebar {
  width: 320px;
  overflow-y: auto;
  padding: 12px;
  backdrop-filter: blur(12px);
  background: rgba(15, 40, 28, 0.6);
  border-right: 1px solid rgba(255,255,255,0.1);
}

.alert {
  border-radius: 12px;
  margin-bottom: 12px;
  padding: 10px;
  backdrop-filter: blur(10px);
  background: rgba(20, 50, 35, 0.5);
  border: 1px solid rgba(255,255,255,0.08);
}

.alert.red { border-left: 5px solid #ff4d4d; }
.alert.blue { border-left: 5px solid #4da6ff; }

.alert h4 {
  margin: 0 0 5px 0;
}

button, select {
  margin-top: 6px;
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px;
  border-radius: 6px;
  backdrop-filter: blur(6px);
  cursor: pointer;
}

button:hover, select:hover {
  background: rgba(255,255,255,0.2);
}

#map {
  flex: 1;
}

.mini-map {
  height: 150px;
  margin-top: 6px;
  border-radius: 8px;
  overflow: hidden;
}

h3 {
  margin-top: 0;
}

summary {
  cursor: pointer;
  font-weight: bold;
}

a {
  color: #7fffd4;
}
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h3>Alerts</h3>
    <select id="stateFilter">
      <option value="ALL">All States</option>
    </select>
    <div id="alerts"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([37.8, -96], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let allAlerts = [];

async function fetchAlerts() {
  const res = await fetch('https://api.weather.gov/alerts/active');
  const data = await res.json();

  allAlerts = data.features.filter(a => {
    const e = a.properties.event;
    return e === 'Tornado Warning' || e === 'Flash Flood Warning';
  });

  populateStates();
  renderAlerts();
}

function populateStates() {
  const select = document.getElementById('stateFilter');
  select.innerHTML = '<option value="ALL">All States</option>';

  const states = new Set();
  allAlerts.forEach(a => {
    const parts = a.properties.areaDesc.split(', ');
    if (parts.length > 0) states.add(parts[parts.length - 1]);
  });

  states.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });
}

function renderAlerts() {
  const container = document.getElementById('alerts');
  container.innerHTML = '';

  const filter = document.getElementById('stateFilter').value;

  allAlerts.forEach((alert, i) => {
    const props = alert.properties;
    const parts = props.areaDesc.split(', ');
    const state = parts[parts.length - 1];

    if (filter !== 'ALL' && state !== filter) return;

    const div = document.createElement('div');
    div.className = 'alert ' + (props.event.includes('Tornado') ? 'red' : 'blue');

    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = props.event;

    const content = document.createElement('div');
    content.innerHTML = `
      <p><b>State:</b> ${state}</p>
      <p><b>Counties:</b> ${props.areaDesc}</p>
      <p><b>Start:</b> ${new Date(props.effective).toLocaleString()}</p>
      <p><b>End:</b> ${new Date(props.expires).toLocaleString()}</p>
      <a href="${props.uri}" target="_blank">Open Alert</a>
      <br>
      <label><input type="checkbox"> Seen</label>
      <br>
      <button onclick="zoomTo(${i})">Zoom</button>
      <div id="mini-${i}" class="mini-map"></div>
    `;

    details.appendChild(summary);
    details.appendChild(content);
    div.appendChild(details);
    container.appendChild(div);

    drawMiniMap(alert, i);
    drawMain(alert);
  });
}

function drawMain(alert) {
  if (!alert.geometry) return;
  L.geoJSON(alert.geometry, {
    style: {
      color: alert.properties.event.includes('Tornado') ? '#ff4d4d' : '#4da6ff',
      weight: 2,
      fillOpacity: 0.2
    }
  }).addTo(map);
}

function drawMiniMap(alert, i) {
  if (!alert.geometry) return;

  const mini = L.map(`mini-${i}`, {
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mini);

  const geo = L.geoJSON(alert.geometry).addTo(mini);
  mini.fitBounds(geo.getBounds());
}

function zoomTo(i) {
  const alert = allAlerts[i];
  if (!alert.geometry) return;
  const geo = L.geoJSON(alert.geometry);
  map.fitBounds(geo.getBounds());
}

document.getElementById('stateFilter').addEventListener('change', renderAlerts);

fetchAlerts();
</script>
</body>
</html>
